<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Editor de Catálogo · ACL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0e151d; --panel:#151f2a; --panel-2:#1b2733; --line:#28353f;
    --text:#e8eef4; --muted:#8aa0b3; --faint:#5f7386;
    --accent:#ff9e2c; --accent-2:#3b82f6; --ok:#3ecf8e; --danger:#ff5d5d;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:
      radial-gradient(90% 60% at 100% 0%,rgba(59,130,246,.10),transparent 60%),
      radial-gradient(70% 50% at 0% 100%,rgba(255,158,44,.08),transparent 55%),
      var(--ink);
    color:var(--text);font-family:"Inter",system-ui,Segoe UI,Roboto,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;min-height:100%}
  .mono{font-family:"JetBrains Mono",ui-monospace,monospace}
  .disp{font-family:"Space Grotesk","Inter",sans-serif}

  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:18px 22px;border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,#18232f,#131c26)}
  .brand{display:flex;align-items:center;gap:12px}
  .logo{width:38px;height:38px;border-radius:10px;flex:none;position:relative;
    background:radial-gradient(120% 120% at 30% 20%,#ffb455,#ff9e2c 45%,#c96f00);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.25),0 4px 14px rgba(255,158,44,.35)}
  .logo::before{content:"";position:absolute;inset:0;margin:auto;width:16px;height:16px;
    background:#0e151d;clip-path:polygon(0 20%,50% 0,100% 20%,100% 45%,50% 65%,0 45%);}
  .brand h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px}
  .brand span{display:block;font-size:11px;color:var(--faint);letter-spacing:1.4px;text-transform:uppercase;font-weight:600;margin-top:2px}
  .tools{display:flex;gap:8px;flex-wrap:wrap;margin-left:auto}

  button,.btn{font-family:inherit;font-size:12.5px;font-weight:600;color:var(--text);
    background:var(--panel-2);border:1px solid var(--line);border-radius:9px;padding:9px 13px;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;transition:.15s;user-select:none}
  button:hover,.btn:hover{border-color:#3a4a58;background:#22303d}
  button:active,.btn:active{transform:translateY(1px)}
  .btn.primary{background:linear-gradient(180deg,#ffab45,#ff9e2c);color:#241300;border-color:#e98a12}
  .btn.primary:hover{background:linear-gradient(180deg,#ffb75c,#ffa634)}
  .btn.pub{background:linear-gradient(180deg,#49d38f,#2fb877);color:#052616;border-color:#1f9860}
  .btn.pub.off{background:var(--panel-2);color:var(--muted);border-color:var(--line)}
  .btn.pub:hover{background:linear-gradient(180deg,#57dd99,#37c380)}
  .btn.danger{color:#ffb0b0;border-color:#5a2a2a}
  .btn.danger:hover{background:#241414;border-color:#7a3535}
  .btn.sm{padding:6px 10px;font-size:11.5px}

  main{max-width:1180px;margin:0 auto;padding:24px 22px 80px}

  .loadbox{max-width:640px;margin:60px auto;text-align:center;background:var(--panel);border:1px solid var(--line);
    border-radius:16px;padding:34px 28px}
  .loadbox h2{font-family:"Space Grotesk";margin:0 0 8px}
  .loadbox p{color:var(--muted);font-size:13.5px;line-height:1.6;margin:0 0 20px}
  .loadbox .row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

  .crumbs{display:flex;align-items:center;flex-wrap:wrap;gap:6px;background:var(--panel);border:1px solid var(--line);
    border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13px}
  .crumbs .c{cursor:pointer;color:var(--muted);font-weight:600}
  .crumbs .c:hover{color:var(--text)}
  .crumbs .cur{color:var(--accent);font-weight:700;font-family:"JetBrains Mono";font-size:12.5px}
  .crumbs .sep{color:var(--faint)}
  .crumbs .home{color:var(--accent-2)}

  .levelbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .levelbar h2{font-family:"Space Grotesk";font-size:17px;margin:0}
  .levelKind{font-size:11.5px;color:var(--faint);font-family:"JetBrains Mono";margin-left:8px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px;
    display:flex;flex-direction:column;gap:10px;overflow:hidden}
  .card .accent{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent)}
  .card.despieceType3d .accent{background:var(--accent-2)}
  .card .top{display:flex;gap:10px;align-items:flex-start}
  .card .ico{width:34px;height:34px;border-radius:9px;background:var(--panel-2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;flex:none}
  .card .ico svg{width:17px;height:17px;stroke:var(--accent);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .card h3{margin:0;font-size:14.5px;font-weight:700;line-height:1.25;word-break:break-word}
  .card .tag{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .card .path{font-size:10.5px;color:var(--faint);font-family:"JetBrains Mono";word-break:break-all}
  .card .row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto}
  .card .cnt{font-size:11px;color:var(--faint);font-family:"JetBrains Mono"}
  .card .actions{display:flex;gap:6px}
  .addcard{display:flex;align-items:center;justify-content:center;border:2px dashed var(--line);border-radius:14px;
    min-height:104px;cursor:pointer;color:var(--muted);font-size:13px;font-weight:600;transition:.15s}
  .addcard:hover{border-color:var(--accent);color:var(--accent);background:rgba(255,158,44,.06)}

  .form{background:var(--panel-2);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:16px}
  .form h4{margin:0 0 12px;font-family:"Space Grotesk";font-size:14px}
  .form .flds{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .form .flds.one{grid-template-columns:1fr}
  .form label{display:block;font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.5px;
    margin-bottom:5px;font-weight:600}
  .form input,.form select{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--text);
    border-radius:8px;padding:9px 10px;font-size:13px;font-family:inherit}
  .form input:focus,.form select:focus{outline:none;border-color:var(--accent)}
  .form .hint{font-size:11px;color:var(--faint);margin-top:5px;line-height:1.4}
  .form .btns{display:flex;gap:8px;margin-top:14px}
  .form .filepick{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}

  .empty{text-align:center;padding:50px 20px;color:var(--faint);font-size:13.5px}
  .legacybox{background:#20303e;border:1px solid #2f6fb0;border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:12.5px}
  .legacybox b{color:#8fd4ff}
  .legacybox .row2{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}

  .footbar{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(0deg,#131c26,rgba(19,28,38,.96));
    border-top:1px solid var(--line);padding:12px 22px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;z-index:10}
  .footbar .info{font-size:11.5px;color:var(--faint);font-family:"JetBrains Mono"}
  .footbar .spacer{flex:1}
  .toast{position:fixed;left:50%;bottom:70px;transform:translateX(-50%);background:#0f2532;border:1px solid #274a63;
    color:#8fd4ff;padding:10px 16px;border-radius:10px;font-size:12.5px;z-index:20;opacity:0;pointer-events:none;transition:.25s}
  .toast.show{opacity:1;bottom:80px}
  .hidden{display:none!important}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo"></div>
    <div><h1 class="disp">Editor de Catálogo</h1><span>Plantas → Zonas → Líneas → Máquinas → Despieces</span></div>
  </div>
  <div class="tools">
    <button class="btn ghost" id="btnReload" title="Volver a leer catalogo.json del sitio">↻ Recargar del sitio</button>
    <button class="btn ghost" id="btnUpload" title="Cargar un catalogo.json desde tu computadora">⇪ Cargar archivo</button>
    <input type="file" id="fileCat" accept=".json,application/json" class="hidden" />
    <button class="btn pub" id="btnSaveGH" title="Guardar el catálogo directamente en GitHub">☁ Guardar en GitHub</button>
    <button class="btn ghost" id="btnGHCfg" title="Conectar con GitHub">⚙</button>
    <button class="btn ghost" id="btnExport" title="Descargar el catalogo.json actualizado">⬇ Descargar</button>
  </div>
</header>

<main>
  <div id="loadStage" class="loadbox">
    <h2 class="disp">Cargando catálogo…</h2>
    <p id="loadMsg">Intentando leer <code class="mono">catalogo.json</code> del mismo sitio.</p>
    <div class="row" id="loadBtns" style="display:none">
      <button class="btn primary" id="btnUpload2">Cargar catalogo.json</button>
      <button class="btn ghost" id="btnEmpty">Empezar uno nuevo desde cero</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <div class="crumbs" id="crumbs"></div>
    <div class="levelbar">
      <div><h2 class="disp" id="levelTitle" style="display:inline"></h2><span class="levelKind" id="levelKind"></span></div>
    </div>
    <div id="content"></div>
  </div>
</main>

<div class="footbar hidden" id="footbar">
  <span class="info" id="footInfo">Sin cambios</span>
  <span class="spacer"></span>
  <span class="info">Después de descargar: sube este archivo a la <b style="color:var(--text)">raíz</b> del repo (reemplaza catalogo.json) y sube los despieces nuevos a <b style="color:var(--text)">/proyectos</b>.</span>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const $=s=>document.querySelector(s);
  const CAT_URL="catalogo.json";
  const ORDER=["plantas","zonas","lineas","maquinas","despieces"];
  const LABELS=["Plantas","Zonas / Áreas","Líneas de embotellado","Máquinas","Despieces / Láminas"];
  const KIND=["planta","zona","línea","máquina","lámina"];
  const ADD_LABEL=["+ Agregar planta","+ Agregar zona","+ Agregar línea","+ Agregar máquina","+ Agregar despiece"];
  const ICONS={
    planta:'<path d="M4 20V9l5-3v3l5-3v3l5-3v14z"/><path d="M4 20h16"/>',
    zona:'<rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 12h16M12 4v16"/>',
    "línea":'<path d="M3 12h4l2-5 3 10 2-5h7"/>',
    "máquina":'<circle cx="12" cy="12" r="3.2"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M18.4 5.6l-2.1 2.1M7.7 16.3l-2.1 2.1"/>',
    "lámina":'<path d="M12 3l8 4-8 4-8-4z"/><path d="M4 12l8 4 8-4M4 16.5l8 4 8-4"/>'
  };

  let DATA=null, PATH=[], dirty=false, addFormOpen=false;

  // ---------- load ----------
  fetch(CAT_URL,{cache:"no-cache"}).then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(d=>{DATA=d;boot();})
    .catch(()=>{
      $("#loadMsg").innerHTML="No encontré <code class=\"mono\">catalogo.json</code> en este mismo sitio (normal si lo estás probando localmente). Cárgalo a mano, o empieza uno nuevo.";
      $("#loadBtns").style.display="flex";
    });

  $("#btnUpload").onclick=()=>$("#fileCat").click();
  $("#btnUpload2").onclick=()=>$("#fileCat").click();
  $("#fileCat").addEventListener("change",e=>{
    const f=e.target.files&&e.target.files[0];if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{try{DATA=JSON.parse(rd.result);boot();toast("Catálogo cargado desde archivo.");}catch(err){alert("El archivo no es un catalogo.json válido.\n"+err.message);}};
    rd.readAsText(f);e.target.value="";
  });
  $("#btnEmpty").onclick=()=>{
    DATA={titulo:"ACL · Despiece de Repuestos",subtitulo:"Catálogo de máquinas por planta",plantas:[]};
    boot();toast("Catálogo nuevo creado. Empieza agregando una planta.");
  };
  $("#btnReload").onclick=()=>{
    if(dirty&&!confirm("Tienes cambios sin descargar. ¿Recargar de todos modos y perderlos?"))return;
    fetch(CAT_URL,{cache:"no-cache"}).then(r=>r.json()).then(d=>{DATA=d;PATH=[];dirty=false;boot();toast("Recargado desde el sitio.");})
      .catch(()=>alert("No se pudo recargar catalogo.json del sitio."));
  };
  $("#btnExport").onclick=exportCatalog;

  function ghUpdateUi(){
    const b=$("#btnSaveGH");if(!b)return;
    const ok=GH.ready();
    b.classList.toggle("off",!ok);
    b.title=ok?("Guardar catalogo.json en "+GH.cfg.owner+"/"+GH.cfg.repo):"Conecta tu GitHub primero (botón ⚙)";
  }
  $("#btnGHCfg").onclick=ghModal;
  $("#btnSaveGH").onclick=async()=>{
    if(!GH.ready()){ghModal();return;}
    if(!DATA){alert("Primero carga el catálogo.");return;}
    const btn=$("#btnSaveGH");const old=btn.textContent;
    btn.textContent="Guardando…";btn.disabled=true;
    try{
      await GH.putFile("catalogo.json",JSON.stringify(DATA,null,1),"Actualizar catalogo.json (desde el editor de catálogo)");
      dirty=false;
      $("#footInfo").textContent="Guardado en GitHub. Se publica en ~1 minuto.";
      $("#footInfo").style.color="var(--ok)";
      toast("catalogo.json guardado en GitHub.");
    }catch(e){
      let hint="";
      if(e.status===401)hint="\n\nEl token no es válido o expiró. Vuelve a conectarlo con el botón ⚙.";
      else if(e.status===403)hint="\n\nEl token no tiene permiso de escritura (Contents: Read and write) sobre este repositorio.";
      else if(e.status===404)hint="\n\nRevisa el usuario/repositorio configurado, o que el token tenga acceso a ese repositorio.";
      else if(e.status===409)hint="\n\nEl archivo cambió en GitHub mientras editabas. Usa \"↻ Recargar del sitio\" y vuelve a aplicar el cambio.";
      alert("No se pudo guardar en GitHub:\n"+e.message+hint);
    }finally{
      btn.textContent=old;btn.disabled=false;
    }
  };
  ghUpdateUi();

  function boot(){
    $("#loadStage").classList.add("hidden");
    $("#app").classList.remove("hidden");
    $("#footbar").classList.remove("hidden");
    PATH=[];addFormOpen=false;
    render();
  }

  function markDirty(){dirty=true;$("#footInfo").textContent="Cambios sin descargar — no olvides bajar el archivo actualizado.";$("#footInfo").style.color="var(--accent)";}
  function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600);}

  // ---------- tree helpers ----------
  function slugify(s){
    return (s||"").toString().normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim()
      .replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"")||("id"+Date.now());
  }
  function uniqueId(base,siblings){
    let id=slugify(base),n=2;
    while(siblings.some(s=>s.id===id)){id=slugify(base)+"-"+n;n++;}
    return id;
  }
  function currentArray(){
    if(PATH.length===0)return DATA.plantas=DATA.plantas||[];
    const key=ORDER[PATH.length];
    const parent=PATH[PATH.length-1];
    parent[key]=parent[key]||[];
    return parent[key];
  }

  // ---------- render ----------
  function render(){
    addFormOpen=false;
    renderCrumbs();
    const depth=PATH.length;
    $("#levelTitle").textContent=LABELS[depth];
    const list=currentArray();
    $("#levelKind").textContent=list.length+" "+(list.length===1?KIND[depth]:KIND[depth]+"s");
    renderContent();
  }

  function renderContent(){
    const depth=PATH.length;
    const list=currentArray();
    const box=$("#content");box.innerHTML="";

    if(depth===4){
      // despieces level: show machine edit box + legacy proyecto handling first
      box.appendChild(machineEditBox(PATH[3]));
    }

    if(addFormOpen){
      box.appendChild(buildAddForm(depth));
    }

    const g=document.createElement("div");g.className="grid";
    list.forEach((node,idx)=>{
      g.appendChild(depth<4?nodeCard(node,depth,list,idx):despieceCard(node,list,idx));
    });
    if(!addFormOpen){
      const add=document.createElement("div");add.className="addcard";add.textContent=ADD_LABEL[depth];
      add.onclick=()=>{addFormOpen=true;renderContent();box.scrollIntoView({behavior:"smooth",block:"start"});};
      g.appendChild(add);
    }
    box.appendChild(g);

    if(!list.length&&!addFormOpen){
      const e=document.createElement("div");e.className="empty";
      e.textContent="Todavía no hay "+LABELS[depth].toLowerCase()+" aquí. Usa la tarjeta de \"+\" para agregar la primera.";
      box.insertBefore(e,g);
    }
  }

  // ---------- node card (plantas/zonas/lineas/maquinas) ----------
  function nodeCard(node,depth,list,idx){
    const kind=KIND[depth];
    const c=document.createElement("div");c.className="card";
    let cnt="";
    if(depth<3){
      const key=ORDER[depth+1];const arr=node[key]||[];
      cnt=arr.length+" "+(arr.length===1?KIND[depth+1]:KIND[depth+1]+"s");
    }else{
      const des=(node.despieces||[]).length + (node.proyecto?1:0);
      cnt=des+" "+(des===1?"lámina":"láminas");
    }
    c.innerHTML=`<span class="accent"></span>
      <div class="top">
        <div class="ico"><svg viewBox="0 0 24 24">${ICONS[kind]}</svg></div>
        <div style="min-width:0"><h3>${esc(node.nombre)}</h3><div class="tag">${kind}${depth===3&&node.marca?" · "+esc(node.marca):""}</div></div>
      </div>
      <div class="row">
        <span class="cnt">${cnt}</span>
        <div class="actions">
          <button class="btn sm" data-act="rename" title="Renombrar">✎</button>
          <button class="btn sm danger" data-act="del" title="Eliminar">🗑</button>
        </div>
      </div>`;
    c.querySelector('[data-act="rename"]').addEventListener("click",ev=>{
      ev.stopPropagation();
      const nn=prompt("Nuevo nombre para \""+node.nombre+"\":",node.nombre);
      if(nn&&nn.trim()){node.nombre=nn.trim();markDirty();render();}
    });
    c.querySelector('[data-act="del"]').addEventListener("click",ev=>{
      ev.stopPropagation();
      if(!confirm("¿Eliminar \""+node.nombre+"\" y todo lo que contiene? Esta acción no se puede deshacer (hasta que recargues).")) return;
      list.splice(idx,1);markDirty();render();
    });
    c.addEventListener("click",()=>{PATH.push(node);render();window.scrollTo({top:0,behavior:"smooth"});});
    return c;
  }

  // ---------- despiece card ----------
  function despieceCard(d,list,idx){
    const tipo=(d.tipo||"").toUpperCase();
    const c=document.createElement("div");c.className="card"+(tipo==="3D"?" despieceType3d":"");
    c.innerHTML=`<span class="accent"></span>
      <div class="top">
        <div class="ico"><svg viewBox="0 0 24 24">${ICONS["lámina"]}</svg></div>
        <div style="min-width:0"><h3>${esc(d.nombre||"Despiece")}</h3><div class="tag">${tipo?tipo+" · ":""}lámina</div></div>
      </div>
      <div class="path">${esc(d.proyecto||"(sin archivo asignado)")}</div>
      <div class="row">
        <span></span>
        <div class="actions">
          <button class="btn sm" data-act="edit" title="Editar">✎</button>
          <button class="btn sm danger" data-act="del" title="Eliminar">🗑</button>
        </div>
      </div>`;
    c.querySelector('[data-act="edit"]').addEventListener("click",()=>{
      openDespieceForm(list,idx,d);
    });
    c.querySelector('[data-act="del"]').addEventListener("click",()=>{
      if(!confirm("¿Eliminar la lámina \""+(d.nombre||"")+"\"?"))return;
      list.splice(idx,1);markDirty();render();
    });
    return c;
  }

  // ---------- add forms ----------
  function buildAddForm(depth){
    const wrap=document.createElement("div");wrap.className="form";
    if(depth<3){
      const kind=KIND[depth];
      wrap.innerHTML=`<h4>Nueva ${kind}</h4>
        <div class="flds one"><div><label>Nombre</label><input type="text" id="afName" placeholder="p.ej. ${depth===0?"Cuzco":depth===1?"Zona de Fuerza":"Línea 3"}" /></div></div>
        <div class="btns"><button class="btn primary" id="afSave">Agregar</button><button class="btn ghost" id="afCancel">Cancelar</button></div>`;
      wrap.querySelector("#afSave").onclick=()=>{
        const nombre=wrap.querySelector("#afName").value.trim();
        if(!nombre){alert("Escribe un nombre.");return;}
        const list=currentArray();
        const node={id:uniqueId(nombre,list),nombre};
        if(depth<2)node[ORDER[depth+1]]=[]; // plantas need zonas[], zonas need lineas[]
        else node.maquinas=[]; // lineas need maquinas[]
        list.push(node);markDirty();addFormOpen=false;render();toast(kind[0].toUpperCase()+kind.slice(1)+" agregada.");
      };
      wrap.querySelector("#afCancel").onclick=()=>{addFormOpen=false;renderContent();};
    }else if(depth===3){
      wrap.innerHTML=`<h4>Nueva máquina</h4>
        <div class="flds">
          <div><label>Nombre</label><input type="text" id="afName" placeholder="p.ej. Etiquetadora" /></div>
          <div><label>Marca (opcional)</label><input type="text" id="afMarca" placeholder="p.ej. KHS, Krones, Sidel, Chriwa" /></div>
        </div>
        <div class="btns"><button class="btn primary" id="afSave">Agregar</button><button class="btn ghost" id="afCancel">Cancelar</button></div>`;
      wrap.querySelector("#afSave").onclick=()=>{
        const nombre=wrap.querySelector("#afName").value.trim();
        if(!nombre){alert("Escribe un nombre.");return;}
        const marca=wrap.querySelector("#afMarca").value.trim();
        const list=currentArray();
        const node={id:uniqueId(nombre,list),nombre,marca,despieces:[]};
        list.push(node);markDirty();addFormOpen=false;render();toast("Máquina agregada.");
      };
      wrap.querySelector("#afCancel").onclick=()=>{addFormOpen=false;renderContent();};
    }else{
      wrap.appendChild(despieceFormFields(null,()=>{addFormOpen=false;renderContent();}));
    }
    return wrap;
  }

  function openDespieceForm(list,idx,d){
    const box=$("#content");
    const existing=box.querySelector(".form.editing");if(existing)existing.remove();
    const wrap=document.createElement("div");wrap.className="form editing";
    wrap.appendChild(despieceFormFields(d,()=>{render();}));
    box.insertBefore(wrap,box.firstChild.nextSibling||box.firstChild);
    wrap.scrollIntoView({behavior:"smooth",block:"center"});
  }

  function despieceFormFields(existing,onDone){
    const isEdit=!!existing;
    const holder=document.createElement("div");
    holder.innerHTML=`<h4>${isEdit?"Editar lámina":"Nueva lámina / despiece"}</h4>
      <div class="flds">
        <div><label>Nombre de la lámina</label><input type="text" id="dfName" placeholder="p.ej. Placas de válvula (pág. 12)" /></div>
        <div><label>Tipo</label><select id="dfTipo"><option value="2D">2D · PDF</option><option value="3D">3D · STP/STL</option></select></div>
      </div>
      <div class="flds one" style="margin-top:10px">
        <div><label>Ruta del archivo del proyecto</label><input type="text" id="dfProy" placeholder="proyectos/nombre_del_archivo.json" class="mono" /></div>
      </div>
      <div class="filepick">
        <label>Detectar desde un archivo .json (opcional)</label>
        <input type="file" id="dfFile" accept=".json,application/json" />
        <div class="hint">Elige el archivo que descargaste con "Publicar proyecto" en el visor — solo para rellenar los campos de arriba, no se sube desde aquí. Recuerda subir ese mismo archivo tú mismo a la carpeta <b>/proyectos</b> en GitHub, con el mismo nombre que pongas en "Ruta del archivo".</div>
      </div>
      <div class="btns">
        <button class="btn primary" id="dfSave">${isEdit?"Guardar cambios":"Agregar lámina"}</button>
        <button class="btn ghost" id="dfCancel">Cancelar</button>
      </div>`;
    if(isEdit){
      holder.querySelector("#dfName").value=existing.nombre||"";
      holder.querySelector("#dfTipo").value=(existing.tipo||"2D").toUpperCase();
      holder.querySelector("#dfProy").value=existing.proyecto||"";
    }
    holder.querySelector("#dfFile").addEventListener("change",e=>{
      const f=e.target.files&&e.target.files[0];if(!f)return;
      const rd=new FileReader();
      rd.onload=()=>{
        try{
          const prj=JSON.parse(rd.result);
          const tipo=(prj.type==="2d")?"2D":"3D";
          holder.querySelector("#dfTipo").value=tipo;
          if(!holder.querySelector("#dfName").value.trim())holder.querySelector("#dfName").value=(prj.name||f.name).replace(/\.(json|pdf|stp|step|stl)$/i,"");
          if(!holder.querySelector("#dfProy").value.trim())holder.querySelector("#dfProy").value="proyectos/"+f.name;
          toast("Datos detectados del archivo. Verifica antes de guardar.");
        }catch(err){alert("Ese archivo no parece un proyecto .json válido.");}
      };
      rd.readAsText(f);
    });
    holder.querySelector("#dfCancel").onclick=onDone;
    holder.querySelector("#dfSave").onclick=()=>{
      const nombre=holder.querySelector("#dfName").value.trim();
      const proyecto=holder.querySelector("#dfProy").value.trim();
      const tipo=holder.querySelector("#dfTipo").value;
      if(!nombre||!proyecto){alert("Completa el nombre y la ruta del archivo.");return;}
      if(isEdit){
        existing.nombre=nombre;existing.tipo=tipo;existing.proyecto=proyecto;
        markDirty();toast("Lámina actualizada.");
      }else{
        const list=currentArray();
        list.push({nombre,tipo,proyecto});
        markDirty();toast("Lámina agregada.");
      }
      onDone();
    };
    return holder;
  }

  // ---------- legacy proyecto (single-despiece machines) ----------
  function machineEditBox(mq){
    const wrap=document.createElement("div");wrap.className="legacybox";
    let html=`<div><b>${esc(mq.nombre)}</b>${mq.marca?" · "+esc(mq.marca):""} — edita el nombre/marca desde la tarjeta de la máquina (nivel anterior).</div>`;
    if(mq.proyecto&&mq.proyecto.trim()){
      html+=`<div style="margin-top:8px">Tiene un <b>proyecto heredado</b> (de una versión anterior, fuera de la lista de láminas): <span class="mono">${esc(mq.proyecto)}</span></div>
        <div class="row2">
          <button class="btn sm" id="migrateBtn">Convertir en lámina de la lista</button>
          <button class="btn sm danger" id="clearLegacyBtn">Quitar este proyecto heredado</button>
        </div>`;
    }
    wrap.innerHTML=html;
    const mig=wrap.querySelector("#migrateBtn");
    if(mig)mig.onclick=()=>{
      mq.despieces=mq.despieces||[];
      mq.despieces.push({nombre:"Despiece principal",tipo:"3D",proyecto:mq.proyecto});
      delete mq.proyecto;
      markDirty();render();toast("Convertido a lámina.");
    };
    const clr=wrap.querySelector("#clearLegacyBtn");
    if(clr)clr.onclick=()=>{
      if(!confirm("¿Quitar el proyecto heredado de esta máquina? (no borra el archivo .json, solo el enlace)"))return;
      delete mq.proyecto;markDirty();render();
    };
    return wrap;
  }

  // ---------- breadcrumbs ----------
  function renderCrumbs(){
    const el=$("#crumbs");el.innerHTML="";
    const home=document.createElement("span");home.className="c home";home.textContent="Catálogo";
    home.onclick=()=>{PATH=[];render();};
    el.appendChild(home);
    PATH.forEach((node,i)=>{
      addSep(el);
      const c=document.createElement("span");
      const last=(i===PATH.length-1);
      c.className=last?"cur":"c";c.textContent=node.nombre;
      if(!last)c.onclick=()=>{PATH=PATH.slice(0,i+1);render();};
      el.appendChild(c);
    });
  }
  function addSep(el){const s=document.createElement("span");s.className="sep";s.textContent="›";el.appendChild(s);}

  // ---------- export ----------
  function exportCatalog(){
    const json=JSON.stringify(DATA,null,1);
    const blob=new Blob([json],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="catalogo.json";
    document.body.appendChild(a);a.click();
    setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},400);
    dirty=false;$("#footInfo").textContent="Descargado. Súbelo a la raíz de tu repo (reemplaza catalogo.json).";$("#footInfo").style.color="var(--ok)";
    toast("catalogo.json descargado.");
  }

  // ================= GitHub (guardado automático) =================
  const GH=(function(){
    const KEY="acl:gh:cfg";
    function b64(str){
      const bytes=new TextEncoder().encode(str);
      let bin="";const CH=0x8000;
      for(let i=0;i<bytes.length;i+=CH)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+CH));
      return btoa(bin);
    }
    function guess(){
      const m=/^([^.]+)\.github\.io$/i.exec(location.hostname||"");
      const owner=m?m[1]:"";
      const seg=(location.pathname||"").split("/").filter(Boolean);
      const repo=(m&&seg.length)?seg[0]:"";
      return {owner,repo,branch:"main",token:""};
    }
    const api={
      get cfg(){try{return JSON.parse(localStorage.getItem(KEY))||null;}catch(e){return null;}},
      set cfg(v){try{localStorage.setItem(KEY,JSON.stringify(v));}catch(e){}},
      clear(){try{localStorage.removeItem(KEY);}catch(e){}},
      ready(){const c=this.cfg;return !!(c&&c.owner&&c.repo&&c.token);},
      guess,
      async req(path,opts){
        const c=this.cfg;if(!c)throw new Error("Sin configurar.");
        const r=await fetch("https://api.github.com"+path,Object.assign({},opts,{headers:Object.assign({
          "Authorization":"Bearer "+c.token,
          "Accept":"application/vnd.github+json",
          "X-GitHub-Api-Version":"2022-11-28"
        },(opts&&opts.headers)||{})}));
        if(r.status===204)return {};
        let j=null;try{j=await r.json();}catch(e){}
        if(!r.ok){
          const msg=(j&&j.message)||("HTTP "+r.status);
          const err=new Error(msg);err.status=r.status;throw err;
        }
        return j;
      },
      repoPath(p){return "/repos/"+this.cfg.owner+"/"+this.cfg.repo+"/contents/"+p.split("/").map(encodeURIComponent).join("/");},
      async getSha(path){
        try{
          const j=await this.req(this.repoPath(path)+"?ref="+encodeURIComponent(this.cfg.branch));
          return (j&&j.sha)||null;
        }catch(e){ if(e.status===404)return null; throw e; }
      },
      async putFile(path,contentStr,message){
        const sha=await this.getSha(path);
        const body={message:message||("Actualizar "+path),content:b64(contentStr),branch:this.cfg.branch};
        if(sha)body.sha=sha;
        return this.req(this.repoPath(path),{method:"PUT",body:JSON.stringify(body)});
      },
      async getJson(path){
        const j=await this.req(this.repoPath(path)+"?ref="+encodeURIComponent(this.cfg.branch));
        const bin=atob((j.content||"").replace(/\n/g,""));
        const bytes=new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);
        return {data:JSON.parse(new TextDecoder().decode(bytes)),sha:j.sha};
      },
      async test(){
        const c=this.cfg;
        const r=await this.req("/repos/"+c.owner+"/"+c.repo);
        return r&&r.full_name;
      }
    };
    return api;
  })();

  function ghModal(){
    const cur=GH.cfg||GH.guess();
    const back=document.createElement("div");
    back.style.cssText="position:fixed;inset:0;background:rgba(4,8,12,.72);z-index:60;display:flex;align-items:center;justify-content:center;padding:18px";
    back.innerHTML='<div style="background:#151f2a;border:1px solid #28353f;border-radius:16px;max-width:520px;width:100%;padding:22px;max-height:90vh;overflow:auto">'
      +'<h3 style="font-family:\'Space Grotesk\',sans-serif;margin:0 0 6px;font-size:17px">Conectar con GitHub</h3>'
      +'<p style="color:#8aa0b3;font-size:12.5px;line-height:1.6;margin:0 0 16px">Con esto, el botón <b style="color:#e8eef4">Guardar en GitHub</b> sube los archivos solo, sin descargar ni subir a mano.</p>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">'
      +'<div><label style="display:block;font-size:10px;color:#5f7386;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600">Usuario / organización</label><input id="ghOwner" style="width:100%;background:#0e151d;border:1px solid #28353f;color:#e8eef4;border-radius:8px;padding:9px;font-size:13px;font-family:\'JetBrains Mono\',monospace"/></div>'
      +'<div><label style="display:block;font-size:10px;color:#5f7386;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600">Repositorio</label><input id="ghRepo" style="width:100%;background:#0e151d;border:1px solid #28353f;color:#e8eef4;border-radius:8px;padding:9px;font-size:13px;font-family:\'JetBrains Mono\',monospace"/></div>'
      +'</div>'
      +'<div style="margin-top:10px"><label style="display:block;font-size:10px;color:#5f7386;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600">Rama</label><input id="ghBranch" style="width:100%;background:#0e151d;border:1px solid #28353f;color:#e8eef4;border-radius:8px;padding:9px;font-size:13px;font-family:\'JetBrains Mono\',monospace"/></div>'
      +'<div style="margin-top:10px"><label style="display:block;font-size:10px;color:#5f7386;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600">Token de acceso (fine-grained)</label><input id="ghToken" type="password" placeholder="github_pat_..." style="width:100%;background:#0e151d;border:1px solid #28353f;color:#e8eef4;border-radius:8px;padding:9px;font-size:13px;font-family:\'JetBrains Mono\',monospace"/></div>'
      +'<div style="margin-top:12px;background:#20303e;border:1px solid #2f6fb0;border-radius:10px;padding:11px 13px;font-size:11.5px;color:#8aa0b3;line-height:1.6">'
      +'<b style="color:#8fd4ff">Cómo sacar el token:</b> GitHub → foto de perfil → Settings → Developer settings → Personal access tokens → <b style="color:#e8eef4">Fine-grained tokens</b> → Generate new token. En <b style="color:#e8eef4">Repository access</b> elige solo este repositorio. En <b style="color:#e8eef4">Permissions → Repository permissions → Contents</b> ponlo en <b style="color:#e8eef4">Read and write</b>. Genera y copia el token aquí.'
      +'<br><br><b style="color:#ffb0b0">Importante:</b> el token se guarda solo en este navegador, nunca dentro de los archivos del repositorio. No lo pegues en ningún archivo ni lo compartas. Si se filtra, revócalo desde la misma pantalla de GitHub.'
      +'</div>'
      +'<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">'
      +'<button id="ghSave" class="btn primary">Probar y guardar</button>'
      +'<button id="ghCancel" class="btn ghost">Cancelar</button>'
      +'<span style="flex:1"></span>'
      +'<button id="ghForget" class="btn ghost" style="color:#ffb0b0;border-color:#5a2a2a">Olvidar token</button>'
      +'</div>'
      +'<div id="ghMsg" style="margin-top:12px;font-size:12px;color:#8aa0b3"></div>'
      +'</div>';
    document.body.appendChild(back);
    const q=s=>back.querySelector(s);
    q("#ghOwner").value=cur.owner||"";q("#ghRepo").value=cur.repo||"";
    q("#ghBranch").value=cur.branch||"main";q("#ghToken").value=cur.token||"";
    const close=()=>back.remove();
    q("#ghCancel").onclick=close;
    back.addEventListener("click",e=>{if(e.target===back)close();});
    q("#ghForget").onclick=()=>{GH.clear();q("#ghToken").value="";q("#ghMsg").textContent="Token borrado de este navegador.";ghUpdateUi();};
    q("#ghSave").onclick=async()=>{
      const cfg={owner:q("#ghOwner").value.trim(),repo:q("#ghRepo").value.trim(),
        branch:q("#ghBranch").value.trim()||"main",token:q("#ghToken").value.trim()};
      if(!cfg.owner||!cfg.repo||!cfg.token){q("#ghMsg").innerHTML='<span style="color:#ffb0b0">Completa usuario, repositorio y token.</span>';return;}
      GH.cfg=cfg;
      q("#ghMsg").textContent="Probando conexión…";
      try{
        const name=await GH.test();
        q("#ghMsg").innerHTML='<span style="color:#3ecf8e">Conectado a '+name+'. Ya puedes usar "Guardar en GitHub".</span>';
        ghUpdateUi();
        setTimeout(close,1200);
      }catch(e){
        let hint="";
        if(e.status===401)hint=" — el token no es válido o expiró.";
        else if(e.status===404)hint=" — revisa el usuario/repositorio, o que el token tenga acceso a ESE repositorio.";
        q("#ghMsg").innerHTML='<span style="color:#ffb0b0">No se pudo conectar: '+esc(e.message)+hint+'</span>';
      }
    };
  }

  function esc(s){return (s||"").toString().replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
})();
</script>
